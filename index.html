<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafetyDrive</title>
<style>
  :root {
    --bg: #131314; --bg2: #1e1f20; --text: #e3e3e3; --sub: #9aa0a6;
    --accent: #8ab4f8; --border: #2d2d2d; --hover: #2d2d2d;
  }
  body.light {
    --bg: #ffffff; --bg2: #f8f9fa; --text: #202124; --sub: #5f6368;
    --accent: #1a73e8; --border: #dadce0; --hover: #f1f3f4;
  }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Google Sans', Arial, sans-serif; }
  body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  header { padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  header.left { display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 20px; font-weight: 400; }
 .theme-btn { background: var(--bg2); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; color: var(--text); cursor: pointer; font-size: 14px; }
 .theme-btn:hover { background: var(--hover); }

 .chat-container { flex: 1; overflow-y: auto; padding: 24px 0; }
 .message { max-width: 768px; margin: 0 auto; padding: 0 24px 24px 24px; display: flex; gap: 16px; }
 .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; flex-shrink: 0; }
 .ai.avatar { background: #a8c7fa; }
 .content { flex: 1; line-height: 1.6; font-size: 15px; padding-top: 4px; }
 .image-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-top: 12px; }
 .image-gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; }

 .input-container { padding: 0 24px 24px 24px; }
 .input-wrapper { max-width: 768px; margin: 0 auto; background: var(--bg2); border: 1px solid var(--border); border-radius: 28px; display: flex; align-items: center; padding: 4px 8px 4px 20px; }
 .input-wrapper:focus-within { border-color: var(--accent); }
  #prompt { flex: 1; background: transparent; border: none; color: var(--text); font-size: 15px; outline: none; padding: 12px 0; }
 .icon-btn { background: none; border: none; color: var(--sub); cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
 .icon-btn:hover { background: var(--hover); }
  #send { background: var(--accent); color: var(--bg); border-radius: 20px; padding: 8px 20px; font-weight: 500; margin-left: 8px; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="left">
    <h1>SafetyDrive</h1>
  </div>
  <button class="theme-btn" onclick="document.body.classList.toggle('light')">Theme</button>
</header>

<div class="chat-container" id="chat">
  <div class="message ai">
    <div class="avatar">AI</div>
    <div class="content">
      Hello Christopher<br><br>
      I am SafetyDrive, your AI co-pilot.
      I only speak when you say "speak" in your message.
      <br><br>You can upload multiple images and ask me anything about driving and safety.
    </div>
  </div>
</div>

<div class="input-container">
  <div class="input-wrapper">
    <button class="icon-btn" onclick="document.getElementById('fileInput').click()">Attach</button>
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
    <input type="text" id="prompt" placeholder="Message SafetyDrive">
    <button class="icon-btn" id="micBtn">Mic</button>
    <button id="send">Send</button>
  </div>
</div>

<script>
const API_KEY = "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";
let images = [];
let shouldSpeak = false;
const chat = document.getElementById('chat');
const prompt = document.getElementById('prompt');

// MULTI IMAGE UPLOAD - UNLIMITED
document.getElementById('fileInput').onchange = (e) => {
  images = [];
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = () => {
      images.push(reader.result);
      if(images.length === files.length) {
        addMessage('user', `${files.length} image${files.length>1?'s':''} attached`, images);
      }
    }
    reader.readAsDataURL(file);
  });
}

// VOICE INPUT
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition) {
  const rec = new SpeechRecognition();
  document.getElementById('micBtn').onclick = () => rec.start();
  rec.onresult = (e) => {
    const text = e.results[0][0].transcript;
    prompt.value = text;
    if(text.toLowerCase().includes('speak')) shouldSpeak = true;
    sendMessage(text);
  }
}

function addMessage(role, text, imgArr = []) {
  const msg = document.createElement('div');
  msg.className = `message ${role}`;

  let imagesHtml = '';
  if(imgArr.length) {
    imagesHtml = '<div class="image-gallery">';
    imgArr.forEach(src => imagesHtml += `<img src="${src}">`);
    imagesHtml += '</div>';
  }

  msg.innerHTML = `
    <div class="avatar">${role === 'user'? 'C' : 'AI'}</div>
    <div class="content">${text}${imagesHtml}</div>
  `;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;

  // ONLY SPEAK WHEN ASKED
  if(role === 'ai' && shouldSpeak) {
    speechSynthesis.speak(new SpeechSynthesisUtterance(text));
    shouldSpeak = false;
  }
}

async function sendMessage(text) {
  if(!text.trim() && images.length === 0) return;

  if(images.length === 0) addMessage('user', text);
  prompt.value = '';
  document.getElementById('send').disabled = true;

  let userPrompt = text;
  if(images.length > 0) userPrompt += ` [${images.length} images attached for analysis]`;

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Authorization": "Bearer " + API_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [
          { role: "system", content: "You are SafetyDrive, an AI assistant for Christopher. Be helpful, accurate, and clear. Format answers nicely with line breaks." },
          { role: "user", content: userPrompt }
        ]
      })
    });
    const data = await res.json();
    addMessage('ai', data.choices[0].message.content);
  } catch(err) {
    addMessage('ai', 'Sorry, I could not connect. Check your internet.');
  }

  document.getElementById('send').disabled = false;
  images = [];
}

document.getElementById('send').onclick = () => sendMessage(prompt.value);
prompt.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(prompt.value); });
</script>
</body>
</html>
