<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafetyDrive</title>
<style>
  :root { --bg: #131314; --bg2: #1e1f20; --text: #e3e3e3; --sub: #9aa0a6; --accent: #8ab4f8; --border: #303134; }
  body.light { --bg: #fff; --bg2: #f1f3f4; --text: #202124; --sub: #5f6368; --accent: #1a73e8; --border: #dadce0; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  
  header { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 22px; font-weight: 400; }
.theme { background: var(--bg2); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; color: var(--text); cursor: pointer; }

  #chat { flex: 1; overflow-y: auto; padding: 0 20px; }
.msg { max-width: 700px; margin: 20px auto; display: flex; gap: 16px; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: var(--bg); display: flex; align-items: center; justify-content: center; font-weight: bold; }
.ai.avatar { background: #a8c7fa; }
.content { flex: 1; line-height: 1.6; font-size: 15px; }
.images { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.images img { width: 120px; height: 120px; object-fit: cover; border-radius: 12px; }

 .input-box { padding: 20px; }
.wrap { max-width: 700px; margin: 0 auto; background: var(--bg2); border: 1px solid var(--border); border-radius: 28px; display: flex; align-items: center; padding: 8px 16px; }
  #text { flex: 1; background: none; border: none; color: var(--text); font-size: 15px; outline: none; }
.btn { background: none; border: none; color: var(--sub); font-size: 16px; cursor: pointer; padding: 8px; }
  #send { background: var(--accent); color: var(--bg); border-radius: 20px; padding: 8px 18px; font-weight: 500; }
</style>
</head>
<body>

<header>
  <h1>SafetyDrive</h1>
  <button class="theme" onclick="document.body.classList.toggle('light')">Theme</button>
</header>

<div id="chat">
  <div class="msg ai">
    <div class="avatar">AI</div>
    <div class="content">Hello Christopher<br><br>I am SafetyDrive. I will only speak when you say "speak".<br>You can upload multiple images and ask me anything.</div>
  </div>
</div>

<div class="input-box">
  <div class="wrap">
    <button class="btn" onclick="document.getElementById('files').click()">Attach</button>
    <input type="file" id="files" multiple accept="image/*" style="display:none">
    <input type="text" id="text" placeholder="Message SafetyDrive">
    <button class="btn" id="mic">Mic</button>
    <button id="send">Send</button>
  </div>
</div>

<script>
const KEY = "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";
let imgs = [];
let speak = false;
const chat = document.getElementById('chat');

// MULTI IMAGE UPLOAD
document.getElementById('files').onchange = e => {
  imgs = [];
  [...e.target.files].forEach(f => {
    const r = new FileReader();
    r.onload = () => { imgs.push(r.result); if(imgs.length === e.target.files.length) add('You', `${imgs.length} images attached`, imgs); }
    r.readAsDataURL(f);
  });
}

// VOICE
const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
document.getElementById('mic').onclick = () => rec.start();
rec.onresult = e => { const t = e.results[0][0].transcript; document.getElementById('text').value = t; if(t.toLowerCase().includes('speak')) speak = true; send(t); }

function add(who, txt, imgArr=[]) {
  const d = document.createElement('div');
  d.className = 'msg ' + (who==='You'?'user':'ai');
  let imgHtml = '';
  if(imgArr.length) { imgHtml = '<div class="images">'; imgArr.forEach(i=>imgHtml+=`<img src="${i}">`); imgHtml+='</div>'; }
  d.innerHTML = `<div class="avatar">${who==='You'?'C':'AI'}</div><div class="content">${txt}${imgHtml}</div>`;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
  if(who==='AI' && speak) { speechSynthesis.speak(new SpeechSynthesisUtterance(txt)); speak=false; }
}

async function send(t) {
  if(!t.trim()) return;
  if(imgs.length===0) add('You', t);
  document.getElementById('text').value = '';
  
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Authorization":"Bearer "+KEY,"Content-Type":"application/json"},
    body:JSON.stringify({model:"llama-3.1-8b-instant",messages:[{role:"system",content:"You are SafetyDrive for Christopher. Be helpful and clear."},{role:"user",content:t}]})
  });
  const data = await res.json();
  add('AI', data.choices[0].message.content);
  imgs = [];
}

document.getElementById('send').onclick = () => send(document.getElementById('text').value);
</script>
</body>
</html>
