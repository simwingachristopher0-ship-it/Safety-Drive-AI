<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAMBIA AI</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: linear-gradient(to bottom, #EF7D00, #FFFFFF); height: 100vh; display: flex; justify-content: center; align-items: center; }
   .container { width: 100%; max-width: 500px; height: 95vh; background: white; border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    
   .header { background: #009E60; color: white; padding: 15px; text-align: center; }
   .header h1 { font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
   .header p { font-size: 12px; margin-top: 4px; opacity: 0.9; }
    
   .chat { flex: 1; overflow-y: auto; padding: 20px; background: #f5f5f5; }
   .msg { margin-bottom: 15px; display: flex; }
   .user { justify-content: flex-end; }
   .ai { justify-content: flex-start; }
   .bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 15px; }
   .user.bubble { background: #009E60; color: white; border-bottom-right-radius: 4px; }
   .ai.bubble { background: white; color: black; border: 1px solid #ddd; border-bottom-left-radius: 4px; }
    
   .input-area { padding: 15px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
   .input-area input { flex: 1; padding: 12px 16px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 15px; }
   .input-area button { background: #009E60; color: white; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
   .input-area button:active { background: #007A4D; }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🇿🇲 ZAMBIA AI</h1>
        <p>Your AI Assistant from Zambia | Powered by OpenRouter</p>
    </div>

    <div class="chat" id="chatBox">
        <div class="msg ai">
            <div class="bubble">Hello! I am Zambia AI. Ask me anything about farming, business, or school.</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask Zambia AI...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const API_KEY = "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";

function addMessage(text, sender) {
    const box = document.getElementById('chatBox');
    box.innerHTML += `<div class="msg ${sender}"><div class="bubble">${text}</div></div>`;
    box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if (!message) return;
    
    addMessage(message, 'user');
    input.value = "";
    addMessage("Thinking...", 'ai');

    try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json", 
                "Authorization": "Bearer " + API_KEY,
                "HTTP-Referer": "https://simwingachristopher0-ship-it.github.io",
                "X-Title": "Zambia AI"
            },
            body: JSON.stringify({
                model: "deepseek/deepseek-r1:free", // More powerful than Gemini
                messages: [
                    {role: "system", content: "You are Zambia AI. Help with farming, business, and education in Zambia. Answer clearly in simple English."},
                    {role: "user", content: message}
                ],
            })
        });
        const data = await res.json();
        
        // Remove "Thinking..."
        const bubbles = document.querySelectorAll('.ai.bubble');
        bubbles[bubbles.length-1].innerText = data.choices[0].message.content;
        
    } catch(e) {
        const bubbles = document.querySelectorAll('.ai.bubble');
        bubbles[bubbles.length-1].innerText = "Sorry, I couldn't get a response. Please try again.";
    }
}

// Send on Enter key
document.getElementById('userInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
