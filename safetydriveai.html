<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAMBIA AI</title>
<style>
body{background:linear-gradient(to bottom,#EF7D00,#FFFFFF);height:100vh;display:flex;justify-content:center;align-items:center;font-family:Arial}
.container{width:100%;max-width:500px;height:95vh;background:white;border-radius:15px;display:flex;flex-direction:column}
.header{background:#009E60;color:white;padding:15px;text-align:center}
.chat{flex:1;overflow-y:auto;padding:20px;background:#f5f5f5}
.msg{display:flex;margin-bottom:15px}
.user{justify-content:flex-end}
.ai{justify-content:flex-start}
.bubble{max-width:80%;padding:12px 16px;border-radius:18px}
.user.bubble{background:#009E60;color:white}
.ai.bubble{background:white;border:1px solid #ddd}
.input-area{padding:15px;background:white;border-top:1px solid #ddd;display:flex;gap:10px}
.input-area input{flex:1;padding:12px;border-radius:25px;border:1px solid #ccc}
.input-area button{background:#009E60;color:white;border:none;padding:12px 20px;border-radius:25px;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>🇿🇲 ZAMBIA AI</h1><p>Powered by OpenRouter</p></div>
<div class="chat" id="chatBox"><div class="msg ai"><div class="bubble">Hello! Ask me anything.</div></div></div>
<div class="input-area"><input type="text" id="userInput" placeholder="Ask Zambia AI..."><button onclick="sendMessage()">Send</button></div>
</div>

<script>
const API_KEY = "PASTE_NEW_KEY_HERE"; // Get new key from openrouter.ai

async function sendMessage(){
const input=document.getElementById('userInput');const msg=input.value.trim();if(!msg)return;
addMessage(msg,'user');input.value="";addMessage("Thinking...",'ai');
const res=await fetch('https://openrouter.ai/api/v1/chat/completions',{
method:'POST',
headers:{
'Authorization':'Bearer '+API_KEY,
'Content-Type':'application/json',
'HTTP-Referer':'https://simwingachristopher0-ship-it.github.io/Safety-Drive-AI/',
'X-Title':'Zambia AI'
},
body:JSON.stringify({
model:'deepseek/deepseek-r1:free', // FREE model
messages:[{role:'user',content:msg}]
})});
const data=await res.json();
const bubbles=document.querySelectorAll('.ai.bubble');
bubbles[bubbles.length-1].innerText=data.choices[0].message.content;
}
function addMessage(text,sender){document.getElementById('chatBox').innerHTML+=`<div class="msg ${sender}"><div class="bubble">${text}</div></div>`}
</script>
</body>
</html>
